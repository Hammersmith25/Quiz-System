<div class="teacher-page">
  <nav class="teacher-navbar">
    <span class="teacher-brand">Teacher Panel</span>
    <div class="nav-actions">
      <button
        type="button"
        [class.active]="activeSection === 'create'"
        (click)="setSection('create')"
      >
        Create Quiz
      </button>
      <button
        type="button"
        [class.active]="activeSection === 'results'"
        (click)="setSection('results')"
      >
        Results
      </button>
    </div>
  </nav>

  <section class="teacher-content">
    @if (activeSection === 'create') {
      <h1>Create Quiz</h1>
      <p>Quiz creation tools will appear here.</p>
    } @else {
      <h1>Results</h1>
      <p>Student quiz results will appear here.</p>
    }
  </section>
</div>
